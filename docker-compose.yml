version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: blockchain-indexer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blockchain_indexer
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: blockchain-indexer-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: blockchain-indexer-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: yarn start:dev:api

  worker-ingest:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: blockchain-indexer-worker-ingest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: yarn start:dev:worker-ingest

  worker-decode:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: blockchain-indexer-worker-decode
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: yarn start:dev:worker-decode

  worker-backfill:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: blockchain-indexer-worker-backfill
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: yarn start:dev:worker-backfill

volumes:
  postgres_data:
